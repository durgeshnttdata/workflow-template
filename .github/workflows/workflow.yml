on:
  workflow_call:
    inputs:
      appName:
        description: 'github-action-cicd-demo'
        required: true
        type: string
      appVersion:
        description: 1.0.0
        required: true
        type: string  
jobs:      
  build_deploy_dev :
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout current  repo
        uses: actions/checkout@v4
    
      - name : Checkout template repo
        uses: actions/checkout@v4
        with:
          repository: 'durgeshnttdata/workflow-template'
          path: 'settings'
    
      - name: Set up JDK 1.8
        uses: actions/setup-java@v1
        with:
          java-version: 1.8
    
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
    
      - name: Build  and Publish to Exchange
        run: mvn -s settings/settings-non-prod.xml clean deploy -DconnectedAppClientId=${{ secrets.CONNECTED_APP_CLIENT_ID }} -DconnectedAppClientSecret=${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
          
      - name: Upload artifact
        uses: actions/upload-artifact@master
        with:
          name: artifacts
          path: target/*.jar
    
      - name : Download artifact
        uses: actions/download-artifact@master
        with:
          name: artifacts
    
      - name: Deploy to Runtime Environment
        run: |
            artifactName=$(ls *.jar | head -1)
            mvn -s settings/settings-non-prod.xml deploy -DmuleDeploy -Dmule.artifact=$artifactName -Dapplication.name=${{ inputs.appName }}-dev -DskipTests -Denv=${{vars.ENV}} -Dtarget=${{vars.TARGET}} -DconnectedAppClientId=${{ secrets.CONNECTED_APP_CLIENT_ID }} -DconnectedAppClientSecret=${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
                # -Danypoint.platform.client_id=${{ secrets.ANYPOINT_CLIENT_ID}} \
                # -Danypoint.platform.client_secret=${{ secrets.ANYPOINT_CLIENT_SECRET }} 
                #  -Ddecryption.key="$DECRYPTION_KEY"
                
  deploy_prod:
    runs-on: ubuntu-latest
    needs: build_deploy_dev
    environment: production
    steps:
      - name: Checkout current  repo 
        uses: actions/checkout@v4 
      - name : Checkout template repo
        uses: actions/checkout@v4
        with:
          repository: 'durgeshnttdata/workflow-template'
          path: 'settings'
      - name: Set up JDK 1.8
        uses: actions/setup-java@v1
        with:
          java-version: 1.8
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      
      - name: Deploy to Runtime Environment
        run: |
            artifactName=$(ls *.jar | head -1)
            mvn -s settings/settings-prod.xml deploy -DmuleDeploy -Dmule.artifact=$artifactName -Dapplication.name=${{ inputs.appName }}-prod -DskipTests -Denv=${{vars.ENV}} -Dtarget=${{vars.TARGET}} -DconnectedAppClientId=${{ secrets.CONNECTED_APP_CLIENT_ID }} -DconnectedAppClientSecret=${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
                # -Danypoint.platform.client_id=${{ secrets.ANYPOINT_CLIENT_ID}} \
                # -Danypoint.platform.client_secret=${{ secrets.ANYPOINT_CLIENT_SECRET }} 
                #  -Ddecryption.key="$DECRYPTION_KEY"
